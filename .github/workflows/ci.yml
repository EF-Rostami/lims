name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build — Next.js
        run: pnpm run build
        env:
          NEXT_PUBLIC_SAAS_API_URL: http://localhost:8000/api/v1/global
          NEXT_PUBLIC_API_URL_LIMS: http://localhost:8000/api/v1/lims
